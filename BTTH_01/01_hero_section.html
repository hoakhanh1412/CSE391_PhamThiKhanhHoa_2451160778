<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio_HoaKhanh</title>
    <style>
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 15px 30px;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .nav-links a {
            color: black;
            text-decoration: none;
            position: relative;
            transition: 0.3s;
            font-size: 20px;
            
        }
        .logo{
            font-size: 28px;
            font-weight: bold;
            color: blue;
        }
        nav {
            display: flex;
            gap: 35px;
        }
        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: #00bcd4;
            transition: 0.3s;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links a:hover {
            color: #00bcd4;
        }
        #menu-toggle {
            display: none;
        }
        .hamburger {
            display: none;
            font-size: 30px;
            cursor: pointer;
        }
        @media (max-width: 768px){
            .hamburger{
                display: block;
            }
            .nav-links {
                position: absolute;
                top: 80px;
                right: 0;
                background: white;
                width: 100%;
                flex-direction: column;
                align-items: center;
                padding: 20px 0;
                display: none;
                gap: 20px;
            }
            #menu-toggle:checked ~ .nav-links {
                display: flex;
            }
        }
    </style>

</head>                                                                                                                                                                                                  
<body>
    <header>
        <div class="logo">Hòa Khánh</div> <!--div thẻ bên trong chứa nội dung thường đc dùng để tạo khối (block)-->
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            ☰
        </label>
        <nav class="nav-links">
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
</body>
</html>
