<!-- grid_layout.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout</title>

  <link rel="stylesheet" href="grid.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1>E-Commerce Store</h1>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-text">
        <h2>Big Sale 50%</h2>
        <p>Mua sắm ngay hôm nay</p>
      </div>

      <!-- Bonus -->
      <div class="featured-card">
        <img src="https://picsum.photos/300/200" alt="">
        <h3>Sản phẩm nổi bật</h3>
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Bộ lọc</h3>

      <label>
        <input type="checkbox">
        Laptop
      </label>

      <label>
        <input type="checkbox">
        Phone
      </label>

      <label>
        <input type="checkbox">
        Gaming
      </label>

      <label>
        <input type="checkbox">
        Accessories
      </label>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <div class="products">

        <div class="card">
          <img src="https://picsum.photos/200/150?1" alt="">
          <h3>Product 1</h3>
          <p>$100</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/200/150?2" alt="">
          <h3>Product 2</h3>
          <p>$150</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/200/150?3" alt="">
          <h3>Product 3</h3>
          <p>$200</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/200/150?4" alt="">
          <h3>Product 4</h3>
          <p>$250</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/200/150?5" alt="">
          <h3>Product 5</h3>
          <p>$300</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/200/150?6" alt="">
          <h3>Product 6</h3>
          <p>$350</p>
        </div>

      </div>

    </main>

    <!-- Ads -->
    <aside class="ads">
      <h3>Advertisement</h3>

      <img src="https://picsum.photos/180/400" alt="">
    </aside>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 E-Commerce Store</p>
    </footer>

  </div>

</body>
</html>
